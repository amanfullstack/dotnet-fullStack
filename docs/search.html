    // Global search result handler on search results page
    function performGlobalSearch(query) {
        if (!query.trim()) {
            document.getElementById('searchPageResults').innerHTML = '<div class="search-empty">Enter a search query to find topics, concepts, and more.</div>';
            document.getElementById('resultCount').textContent = '0';
            return;
        }

        const results = getAllSearchData().filter(item => {
            const queryLower = query.toLowerCase();
            return item.title.toLowerCase().includes(queryLower) ||
                   item.section.toLowerCase().includes(queryLower) ||
                   item.keywords.toLowerCase().includes(queryLower) ||
                   item.description.toLowerCase().includes(queryLower);
        });

        document.getElementById('resultCount').textContent = results.length;
        document.getElementById('queryDisplay').textContent = query;

        if (!results.length) {
            document.getElementById('searchPageResults').innerHTML = '<div class="search-empty">No results found for "' + query + '"</div>';
            return;
        }

        const html = results.map(item => `
            <a href="${item.url}" class="search-page-result">
                <div class="search-page-result-icon">${item.icon}</div>
                <div class="search-page-result-content">
                    <div class="search-page-result-title">${item.title}</div>
                    <div class="search-page-result-section">${item.section}</div>
                    <div class="search-page-result-description">${item.description}</div>
                </div>
            </a>
        `).join('');

        document.getElementById('searchPageResults').innerHTML = html;
    }

    // Handle search on page load
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q') || '';

        if (query) {
            document.getElementById('searchInput').value = query;
            performGlobalSearch(query);
        }

        // Initialize modal search
        const input = document.getElementById('searchInput');
        if (input) {
            input.addEventListener('input', function() {
                performGlobalSearch(this.value);
            });
        }
    });

    // Global openSearch function for header
    function openSearch() {
        const modal = document.getElementById('searchModal');
        const input = document.getElementById('searchInput');
        if (!modal) return;
        modal.classList.add('open');
        document.body.classList.add('no-scroll');
        if (input) { input.value = ''; input.focus(); }
    }

    function closeSearch() {
        const modal = document.getElementById('searchModal');
        if (modal) modal.classList.remove('open');
        document.body.classList.remove('no-scroll');
    }
</script>
